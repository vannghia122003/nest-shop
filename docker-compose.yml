services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - CLIENT_URL=host.docker.internal:3000
    # expose:
    #   - 4000

  frontend:
    depends_on:
      - backend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3000:80
    environment:
      - VITE_API_URL=backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
